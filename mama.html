<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0c20" />
  <meta name="format-detection" content="telephone=no" />
  <title>С днем рождения, Мама!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-1: #0f0c20;
      --bg-2: #16122d;
      --bg-3: #231942;
      --pink-1: #ff4d8d;
      --pink-2: #ff7aa8;
      --pink-3: #d91d6b;
      --gold-1: #ffd86a;
      --gold-2: #ffbf1f;
      --cyan-1: #56d8ff;
      --violet-1: #b867ff;
      --white-1: rgba(255, 255, 255, 0.98);
      --white-2: rgba(255, 255, 255, 0.92);
      --white-3: rgba(255, 255, 255, 0.76);
      --line-soft: rgba(255, 255, 255, 0.14);
      --glass-fill: rgba(255, 255, 255, 0.09);
      --glass-fill-strong: rgba(255, 255, 255, 0.12);
      --shadow-1: 0 30px 70px rgba(0, 0, 0, 0.42);
      --shadow-2: 0 20px 40px rgba(255, 77, 141, 0.18);
      --shadow-3: 0 10px 30px rgba(0, 0, 0, 0.25);
      --radius-card: 32px;
      --radius-soft: 24px;
      --radius-pill: 999px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --max-stage: 460px;
      --transition-fast: 180ms ease;
      --transition-mid: 360ms cubic-bezier(0.22, 1, 0.36, 1);
      --transition-slow: 800ms cubic-bezier(0.2, 0.8, 0.2, 1);
      --font-ui: 'Montserrat', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-script: 'Caveat', cursive;
      --photo-size: clamp(144px, 34vw, 184px);
      --gift-size: clamp(156px, 42vw, 196px);
      --card-width: min(100%, 410px);
      --text-xs: clamp(12px, 3.1vw, 13px);
      --text-sm: clamp(14px, 3.7vw, 16px);
      --text-md: clamp(16px, 4.2vw, 18px);
      --text-lg: clamp(18px, 4.9vw, 22px);
      --text-xl: clamp(20px, 5.6vw, 28px);
      --text-hero: clamp(38px, 10vw, 56px);
    }

    html {
      height: 100%;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      background: var(--bg-1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      overflow: hidden;
      color: #fff;
      font-family: var(--font-ui);
      background:
        radial-gradient(1200px 700px at 50% -10%, rgba(255, 77, 141, 0.16), transparent 55%),
        radial-gradient(900px 520px at 100% 100%, rgba(86, 216, 255, 0.1), transparent 45%),
        linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 44%, #0a0816 100%);
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      position: relative;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    img, svg, canvas {
      display: block;
      max-width: 100%;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      width: 100%;
      overflow: hidden;
      isolation: isolate;
      padding-top: max(14px, var(--safe-top));
      padding-right: max(14px, var(--safe-right));
      padding-bottom: max(18px, var(--safe-bottom));
      padding-left: max(14px, var(--safe-left));
    }

    .background-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.9) 0 0.8px, transparent 1px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.8) 0 0.9px, transparent 1.1px),
        radial-gradient(circle at 35% 80%, rgba(255,255,255,0.7) 0 0.8px, transparent 1px),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,0.6) 0 0.7px, transparent 0.95px);
      background-size: 110px 110px, 140px 140px, 180px 180px, 220px 220px;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(64px);
      opacity: 0.48;
      will-change: transform, opacity;
      transform: translate3d(0,0,0);
    }

    .orb-a {
      width: min(52vw, 360px);
      height: min(52vw, 360px);
      top: -8%;
      left: -8%;
      background: radial-gradient(circle, rgba(255, 77, 141, 0.95) 0%, rgba(255, 77, 141, 0.24) 42%, transparent 70%);
      animation: drift-a 16s ease-in-out infinite;
    }

    .orb-b {
      width: min(48vw, 320px);
      height: min(48vw, 320px);
      right: -6%;
      bottom: -6%;
      background: radial-gradient(circle, rgba(86, 216, 255, 0.92) 0%, rgba(86, 216, 255, 0.22) 40%, transparent 68%);
      animation: drift-b 18s ease-in-out infinite;
    }

    .orb-c {
      width: min(42vw, 260px);
      height: min(42vw, 260px);
      left: 50%;
      top: 38%;
      margin-left: -21vw;
      background: radial-gradient(circle, rgba(255, 191, 31, 0.92) 0%, rgba(255, 191, 31, 0.18) 42%, transparent 68%);
      animation: drift-c 20s ease-in-out infinite;
    }

    .spark-ring {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 15% 22%, rgba(255,255,255,0.25) 0 1.2px, transparent 1.4px),
        radial-gradient(circle at 82% 18%, rgba(255,216,106,0.35) 0 1.2px, transparent 1.5px),
        radial-gradient(circle at 78% 76%, rgba(255,255,255,0.28) 0 1px, transparent 1.3px),
        radial-gradient(circle at 18% 72%, rgba(86,216,255,0.28) 0 1px, transparent 1.3px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12) 0 0.8px, transparent 1px);
      animation: shimmer 8s linear infinite;
      opacity: 0.8;
    }

    #fx-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .layout {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - max(14px, var(--safe-top)) - max(18px, var(--safe-bottom)));
      min-height: calc(100svh - max(14px, var(--safe-top)) - max(18px, var(--safe-bottom)));
      min-height: calc(100dvh - max(14px, var(--safe-top)) - max(18px, var(--safe-bottom)));
      display: grid;
      place-items: center;
    }

    .stage {
      position: relative;
      width: min(100%, var(--max-stage));
      min-height: clamp(520px, 82dvh, 760px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .floating-frame {
      position: absolute;
      inset: 50% auto auto 50%;
      width: min(100%, 440px);
      height: auto;
      transform: translate(-50%, -50%);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
      pointer-events: none;
      opacity: 0.7;
    }

    .floating-frame::before,
    .floating-frame::after {
      content: '';
      position: absolute;
      border-radius: inherit;
      inset: 10px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .view {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity var(--transition-mid), transform var(--transition-mid), visibility var(--transition-mid);
      will-change: transform, opacity;
    }

    .view[hidden] {
      display: none !important;
    }

    .gift-view {
      flex-direction: column;
      gap: 18px;
      padding: 26px 10px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      color: var(--white-2);
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .eyebrow-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(180deg, var(--gold-1), var(--gold-2));
      box-shadow: 0 0 12px rgba(255, 191, 31, 0.55);
    }

    .gift-hint {
      font-family: var(--font-script);
      font-size: clamp(30px, 7.5vw, 42px);
      line-height: 1;
      color: var(--gold-1);
      text-shadow: 0 0 18px rgba(255, 216, 106, 0.32);
      animation: breathe 2.2s ease-in-out infinite;
      padding: 0 10px;
    }

    .gift-subhint {
      max-width: 27ch;
      color: var(--white-3);
      font-size: var(--text-sm);
      line-height: 1.45;
      padding: 0 8px;
    }

    .gift-button-wrap {
      position: relative;
      width: var(--gift-size);
      height: var(--gift-size);
      display: grid;
      place-items: center;
      margin-top: 4px;
    }

    .gift-pulse,
    .gift-pulse::before,
    .gift-pulse::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      content: '';
    }

    .gift-pulse {
      background: radial-gradient(circle, rgba(255, 77, 141, 0.12), transparent 70%);
      transform: scale(1.15);
      filter: blur(10px);
    }

    .gift-pulse::before {
      border: 1px solid rgba(255, 255, 255, 0.08);
      animation: pulse-ring 2.4s ease-out infinite;
    }

    .gift-pulse::after {
      border: 1px solid rgba(255, 216, 106, 0.12);
      animation: pulse-ring 2.4s ease-out 1.1s infinite;
    }

    .gift-button {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 0;
      border: 0;
      border-radius: 28px;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      appearance: none;
      outline: none;
      filter: drop-shadow(0 22px 44px rgba(255, 77, 141, 0.22));
      transition: transform var(--transition-fast), filter var(--transition-fast), opacity var(--transition-fast);
    }

    .gift-button:focus-visible {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2), 0 0 0 7px rgba(255,216,106,0.16);
    }

    .gift-button:active {
      transform: scale(0.98);
    }

    .gift-button svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .gift-body {
      transform-origin: center;
      transition: transform 420ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .gift-ribbon {
      transition: filter 420ms ease;
    }

    .gift-lid {
      transform-origin: 100px 84px;
      transition: transform 700ms cubic-bezier(0.22, 1, 0.36, 1), opacity 460ms ease;
      will-change: transform, opacity;
    }

    .gift-button.is-hover-ready:hover .gift-body,
    .gift-button.is-hover-ready:focus-visible .gift-body {
      transform: translateY(-2px);
    }

    .gift-button.shake {
      animation: gift-shake 520ms cubic-bezier(.36,.07,.19,.97) both;
    }

    .gift-button.opened .gift-lid {
      transform: translate(-10px, -104px) rotate(-24deg) scale(1.02);
      opacity: 0;
    }

    .gift-button.opened .gift-ribbon {
      filter: brightness(1.08) saturate(1.04);
    }

    .gift-button.opened .gift-body {
      transform: scale(0.98);
    }

    .helper-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--white-3);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: var(--text-xs);
      font-weight: 600;
      line-height: 1;
    }

    .helper-chip svg {
      width: 14px;
      height: 14px;
      opacity: 0.88;
    }

    .card-view {
      width: 100%;
      padding: 14px 0;
    }

    .card {
      position: relative;
      width: var(--card-width);
      margin: 0 auto;
      padding: 18px;
      border-radius: var(--radius-card);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.08)),
        radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 32%),
        rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(24px) saturate(125%);
      -webkit-backdrop-filter: blur(24px) saturate(125%);
      box-shadow: var(--shadow-1), var(--shadow-2), inset 0 1px 0 rgba(255,255,255,0.12);
      overflow: hidden;
      transform: translateY(34px) scale(0.95);
      opacity: 0;
      will-change: transform, opacity;
    }

    .card.is-visible {
      animation: reveal-card 960ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .card-glow {
      position: absolute;
      inset: -80px auto auto -80px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 216, 106, 0.22), transparent 68%);
      filter: blur(12px);
      pointer-events: none;
    }

    .card-glow-2 {
      position: absolute;
      inset: auto -90px -90px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(255, 77, 141, 0.18), transparent 68%);
      filter: blur(18px);
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      justify-items: center;
      text-align: center;
    }

    .photo-shell {
      position: relative;
      width: var(--photo-size);
      height: var(--photo-size);
      display: grid;
      place-items: center;
      margin-top: 2px;
      opacity: 0;
      transform: scale(0.78);
    }

    .card.is-visible .photo-shell {
      animation: photo-in 800ms cubic-bezier(0.34, 1.56, 0.64, 1) 160ms forwards;
    }

    .photo-aura,
    .photo-aura::before,
    .photo-aura::after {
      position: absolute;
      content: '';
      border-radius: 50%;
      inset: 0;
    }

    .photo-aura {
      background: conic-gradient(from 0deg, var(--gold-1), var(--pink-1), var(--cyan-1), var(--gold-1));
      animation: spin-slow 12s linear infinite;
      filter: saturate(1.1);
      box-shadow: 0 16px 32px rgba(255, 77, 141, 0.22);
    }

    .photo-aura::before {
      inset: 5px;
      background: #130f25;
    }

    .photo-aura::after {
      inset: -6px;
      background: radial-gradient(circle, rgba(255,216,106,0.2), transparent 70%);
      filter: blur(10px);
      z-index: -1;
    }

    .photo-frame {
      position: relative;
      width: calc(var(--photo-size) - 10px);
      height: calc(var(--photo-size) - 10px);
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(17, 12, 34, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12), var(--shadow-3);
      background: #151028;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.01);
    }

    .headline {
      font-family: var(--font-script);
      font-size: var(--text-hero);
      line-height: 0.96;
      letter-spacing: -0.01em;
      margin: 2px 0 0;
      background: linear-gradient(180deg, #fff 0%, #fff7d5 44%, #ffd86a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 6px 24px rgba(255, 216, 106, 0.08);
      opacity: 0;
      transform: translateY(16px);
    }

    .card.is-visible .headline {
      animation: content-rise 620ms ease 300ms forwards;
    }

    .age-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.14);
      color: #ffb2ca;
      font-size: var(--text-xs);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(16px);
    }

    .card.is-visible .age-badge {
      animation: content-rise 620ms ease 420ms forwards;
    }

    .message-box {
      width: 100%;
      padding: 16px 16px 15px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--white-2);
      font-size: var(--text-md);
      line-height: 1.55;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      opacity: 0;
      transform: translateY(16px);
    }

    .card.is-visible .message-box {
      animation: content-rise 620ms ease 540ms forwards;
    }

    .signature-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      min-height: 24px;
      color: var(--white-3);
      font-size: var(--text-sm);
      opacity: 0;
      transform: translateY(16px);
    }

    .card.is-visible .signature-row {
      animation: content-rise 620ms ease 660ms forwards;
    }

    .signature-heart {
      width: 18px;
      height: 18px;
      color: #ff86b4;
      filter: drop-shadow(0 4px 8px rgba(255, 77, 141, 0.28));
    }

    .actions-row {
      display: flex;
      gap: 10px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
      padding-top: 2px;
      opacity: 0;
      transform: translateY(16px);
    }

    .card.is-visible .actions-row {
      animation: content-rise 620ms ease 760ms forwards;
    }

    .action-btn {
      min-width: 138px;
      min-height: 46px;
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      cursor: pointer;
      touch-action: manipulation;
      appearance: none;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), opacity var(--transition-fast), background var(--transition-fast);
    }

    .action-btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.22), 0 0 0 7px rgba(255,216,106,0.16);
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn-primary {
      color: #1a122c;
      background: linear-gradient(180deg, #ffe48e 0%, #ffd86a 45%, #ffbf1f 100%);
      box-shadow: 0 12px 22px rgba(255, 191, 31, 0.24);
    }

    .action-btn-secondary {
      color: var(--white-1);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.16);
    }

    .footer-note {
      position: absolute;
      left: 50%;
      bottom: max(10px, var(--safe-bottom));
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255,255,255,0.58);
      font-size: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
      z-index: 2;
      white-space: nowrap;
      pointer-events: none;
    }

    .screen-flash {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.55), rgba(255,255,255,0.18) 24%, transparent 58%);
      opacity: 0;
    }

    .screen-flash.active {
      animation: flash-burst 520ms ease-out forwards;
    }

    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    @keyframes drift-a {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.46; }
      50% { transform: translate3d(24px, 20px, 0) scale(1.08); opacity: 0.58; }
    }

    @keyframes drift-b {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.42; }
      50% { transform: translate3d(-22px, -18px, 0) scale(1.05); opacity: 0.5; }
    }

    @keyframes drift-c {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.28; }
      50% { transform: translate3d(0, -16px, 0) scale(1.08); opacity: 0.34; }
    }

    @keyframes shimmer {
      0% { transform: translate3d(0,0,0) rotate(0deg); }
      100% { transform: translate3d(0,0,0) rotate(360deg); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.88; }
      50% { transform: scale(1.04); opacity: 1; }
    }

    @keyframes pulse-ring {
      0% { transform: scale(0.84); opacity: 0; }
      25% { opacity: 0.42; }
      100% { transform: scale(1.28); opacity: 0; }
    }

    @keyframes gift-shake {
      10%, 90% { transform: translate3d(-2px, 0, 0) rotate(-2deg); }
      20%, 80% { transform: translate3d(4px, 0, 0) rotate(2deg); }
      30%, 50%, 70% { transform: translate3d(-7px, 0, 0) rotate(-4deg); }
      40%, 60% { transform: translate3d(7px, 0, 0) rotate(4deg); }
    }

    @keyframes reveal-card {
      from {
        opacity: 0;
        transform: translateY(34px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes photo-in {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes content-rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes flash-burst {
      0% { opacity: 0; }
      20% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 390px) {
      .app-shell {
        padding-right: max(12px, var(--safe-right));
        padding-left: max(12px, var(--safe-left));
      }

      .stage {
        min-height: clamp(500px, 82dvh, 700px);
      }

      .card {
        padding: 16px;
        border-radius: 28px;
      }

      .message-box {
        padding: 14px 14px 13px;
      }

      .action-btn {
        min-width: 128px;
      }
    }

    @media (min-width: 391px) and (max-width: 430px) {
      .stage {
        min-height: clamp(540px, 84dvh, 760px);
      }
    }

    @media (min-height: 850px) {
      .gift-view {
        gap: 20px;
      }

      .card {
        padding-top: 20px;
        padding-bottom: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orb,
      .spark-ring,
      .gift-hint,
      .gift-pulse::before,
      .gift-pulse::after,
      .photo-aura,
      .gift-button.shake,
      .card.is-visible,
      .card.is-visible .photo-shell,
      .card.is-visible .headline,
      .card.is-visible .age-badge,
      .card.is-visible .message-box,
      .card.is-visible .signature-row,
      .card.is-visible .actions-row,
      .screen-flash.active {
        animation: none !important;
      }

      .gift-lid,
      .gift-body,
      .view,
      .card,
      .action-btn,
      .gift-button {
        transition: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <div class="background-layer" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
      <div class="spark-ring"></div>
      <div class="noise-overlay"></div>
      <canvas id="fx-canvas"></canvas>
    </div>

    <div class="layout">
      <div class="stage" id="stage">
        <div class="floating-frame" aria-hidden="true"></div>

        <section class="view gift-view" id="giftView" aria-label="Открытие подарка">
          <div class="eyebrow">
            <span class="eyebrow-dot"></span>
            Особенный день
          </div>

          <div class="gift-hint">Коснись подарка</div>

          <p class="gift-subhint">
            Нажми один раз. Тебя ждет праздничная открытка.
          </p>

          <div class="gift-button-wrap">
            <div class="gift-pulse" aria-hidden="true"></div>

            <button
              class="gift-button"
              id="giftButton"
              type="button"
              aria-controls="cardView"
              aria-expanded="false"
              aria-label="Открыть подарок"
            >
              <svg viewBox="0 0 200 200" aria-hidden="true" focusable="false">
                <defs>
                  <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff5a98" />
                    <stop offset="50%" stop-color="#ff4081" />
                    <stop offset="100%" stop-color="#c51162" />
                  </linearGradient>
                  <linearGradient id="boxShine" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.35)" />
                    <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                  </linearGradient>
                  <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fff0a3" />
                    <stop offset="100%" stop-color="#f6bb14" />
                  </linearGradient>
                  <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="rgba(0,0,0,0.28)" />
                  </filter>
                </defs>

                <ellipse cx="100" cy="181" rx="64" ry="12" fill="rgba(0,0,0,0.36)" />

                <g class="gift-body" filter="url(#softShadow)">
                  <rect x="40" y="84" width="120" height="88" rx="14" fill="url(#boxGrad)" />
                  <rect x="40" y="84" width="120" height="22" rx="14" fill="url(#boxShine)" opacity="0.34" />
                  <rect class="gift-ribbon" x="90" y="84" width="20" height="88" fill="url(#ribbonGrad)" />
                  <rect x="40" y="124" width="120" height="1.4" fill="rgba(255,255,255,0.1)" />
                </g>

                <g class="gift-lid" id="giftLid">
                  <rect x="34" y="62" width="132" height="28" rx="10" fill="url(#boxGrad)" />
                  <rect x="34" y="62" width="132" height="7" rx="7" fill="rgba(255,255,255,0.2)" />
                  <rect class="gift-ribbon" x="90" y="62" width="20" height="28" fill="url(#ribbonGrad)" />
                  <path d="M100 61C54 16 25 57 55 71C69 77 84 69 100 61Z" fill="url(#ribbonGrad)" />
                  <path d="M100 61C146 16 175 57 145 71C131 77 116 69 100 61Z" fill="url(#ribbonGrad)" />
                  <ellipse cx="100" cy="60" rx="12" ry="7" fill="rgba(255,255,255,0.18)" />
                </g>
              </svg>
              <span class="sr-only">Открыть подарок</span>
            </button>
          </div>

          <div class="helper-chip" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            Нажми и смотри
          </div>
        </section>

        <section class="view card-view" id="cardView" hidden aria-label="Поздравительная открытка">
          <div class="card" id="birthdayCard">
            <div class="card-glow" aria-hidden="true"></div>
            <div class="card-glow-2" aria-hidden="true"></div>

            <div class="card-inner">
              <div class="photo-shell">
                <div class="photo-aura" aria-hidden="true"></div>
                <div class="photo-frame">
                  <img src="mama.png" alt="Мама" id="momPhoto" />
                </div>
              </div>

              <h1 class="headline">С Днем Рождения!</h1>

              <div class="age-badge">Тебе 41 год</div>

              <div class="message-box">
                Мамочка, оставайся всегда такой же яркой, красивой и счастливой. Я тебя безмерно люблю!
              </div>

              <div class="signature-row">
                <svg class="signature-heart" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5C2 5.42 4.42 3 7.5 3C9.24 3 10.91 3.81 12 5.09C13.09 3.81 14.76 3 16.5 3C19.58 3 22 5.42 22 8.5C22 12.28 18.6 15.36 13.45 20.04L12 21.35Z"></path>
                </svg>
                С любовью
              </div>

              <div class="actions-row">
                <button class="action-btn action-btn-primary" id="replayButton" type="button">
                  Открыть снова
                </button>
                <button class="action-btn action-btn-secondary" id="burstButton" type="button">
                  Еще блесток
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div class="screen-flash" id="screenFlash" aria-hidden="true"></div>

    <div class="footer-note" aria-hidden="true">
      С любовью и теплом
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      const state = {
        opened: false,
        reducedMotion: window.matchMedia('(prefers-reduced-motion: reduce)').matches,
        width: 0,
        height: 0,
        dpr: 1,
        rafId: 0,
        particles: [],
        lastBackgroundSpawn: 0,
        backgroundSpawnInterval: 220,
        visibilityPaused: false,
      };

      const elements = {
        shell: document.getElementById('appShell'),
        stage: document.getElementById('stage'),
        canvas: document.getElementById('fx-canvas'),
        giftView: document.getElementById('giftView'),
        giftButton: document.getElementById('giftButton'),
        giftLid: document.getElementById('giftLid'),
        cardView: document.getElementById('cardView'),
        card: document.getElementById('birthdayCard'),
        replayButton: document.getElementById('replayButton'),
        burstButton: document.getElementById('burstButton'),
        flash: document.getElementById('screenFlash'),
        momPhoto: document.getElementById('momPhoto'),
      };

      const ctx = elements.canvas.getContext('2d', { alpha: true });
      let resizeRaf = 0;

      const particlePalette = ['#ff4d8d', '#ffd86a', '#ffffff', '#56d8ff', '#b867ff', '#ff9cc1'];

      class Particle {
        constructor(x, y, type) {
          this.type = type;
          this.x = x;
          this.y = y;
          this.life = 1;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.1;
          this.color = particlePalette[(Math.random() * particlePalette.length) | 0];

          if (type === 'burst') {
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 5.2 + 2.8;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed - Math.random() * 1.8;
            this.size = Math.random() * 4.2 + 1.6;
            this.gravity = 0.11 + Math.random() * 0.06;
            this.decay = 0.012 + Math.random() * 0.016;
            this.drag = 0.992;
            this.shape = Math.random() > 0.48 ? 'circle' : 'star';
            this.opacityBoost = 1;
          } else {
            this.vx = (Math.random() - 0.5) * 0.18;
            this.vy = Math.random() * 0.55 + 0.16;
            this.size = Math.random() * 2.2 + 0.8;
            this.gravity = 0;
            this.decay = 0.0024 + Math.random() * 0.002;
            this.drag = 1;
            this.shape = Math.random() > 0.75 ? 'star' : 'circle';
            this.opacityBoost = 0.8;
          }
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.rotation += this.rotationSpeed;

          if (this.type === 'burst') {
            this.vx *= this.drag;
            this.vy *= this.drag;
            this.vy += this.gravity;
          } else {
            this.vx += (Math.random() - 0.5) * 0.01;
          }

          this.life -= this.decay;
        }

        draw(context) {
          if (this.life <= 0) return;

          context.save();
          context.translate(this.x, this.y);
          context.rotate(this.rotation);
          context.globalAlpha = Math.max(0, this.life * this.opacityBoost);
          context.fillStyle = this.color;

          if (this.shape === 'circle') {
            context.beginPath();
            context.arc(0, 0, this.size, 0, Math.PI * 2);
            context.fill();
          } else {
            drawStar(context, this.size);
          }

          context.restore();
        }

        isDead(width, height) {
          return this.life <= 0 || this.y > height + 60 || this.y < -80 || this.x < -80 || this.x > width + 80;
        }
      }

      function drawStar(context, radius) {
        const inner = radius * 0.48;
        context.beginPath();
        for (let i = 0; i < 10; i++) {
          const angle = Math.PI / 5 * i - Math.PI / 2;
          const r = i % 2 === 0 ? radius : inner;
          const x = Math.cos(angle) * r;
          const y = Math.sin(angle) * r;
          if (i === 0) {
            context.moveTo(x, y);
          } else {
            context.lineTo(x, y);
          }
        }
        context.closePath();
        context.fill();
      }

      function setInteractiveClass() {
        const supportsHover = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        elements.giftButton.classList.toggle('is-hover-ready', supportsHover);
      }

      function resizeCanvas() {
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);

        elements.canvas.width = Math.round(state.width * state.dpr);
        elements.canvas.height = Math.round(state.height * state.dpr);
        elements.canvas.style.width = state.width + 'px';
        elements.canvas.style.height = state.height + 'px';

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(state.dpr, state.dpr);
      }

      function requestResize() {
        if (resizeRaf) cancelAnimationFrame(resizeRaf);
        resizeRaf = requestAnimationFrame(() => {
          resizeCanvas();
          resizeRaf = 0;
        });
      }

      function addBackgroundParticle() {
        const maxBackground = state.reducedMotion ? 8 : 26;
        let backgroundCount = 0;
        for (let i = 0; i < state.particles.length; i++) {
          if (state.particles[i].type === 'background') backgroundCount++;
        }

        if (backgroundCount >= maxBackground) return;

        const x = Math.random() * state.width;
        const y = -18;
        state.particles.push(new Particle(x, y, 'background'));
      }

      function burstAt(x, y, amount) {
        const count = state.reducedMotion ? Math.min(amount, 26) : amount;
        for (let i = 0; i < count; i++) {
          state.particles.push(new Particle(x, y, 'burst'));
        }
      }

      function burstAroundCard() {
        const rect = elements.card.getBoundingClientRect();
        const topX = rect.left + rect.width * 0.5;
        const topY = rect.top + rect.height * 0.18;
        const leftX = rect.left + rect.width * 0.15;
        const rightX = rect.left + rect.width * 0.85;
        const midY = rect.top + rect.height * 0.44;

        burstAt(topX, topY, 42);
        burstAt(leftX, midY, 20);
        burstAt(rightX, midY, 20);
      }

      function animate(timestamp) {
        ctx.clearRect(0, 0, state.width, state.height);

        if (!state.reducedMotion && !state.opened && timestamp - state.lastBackgroundSpawn > state.backgroundSpawnInterval) {
          addBackgroundParticle();
          state.lastBackgroundSpawn = timestamp;
        }

        for (let i = state.particles.length - 1; i >= 0; i--) {
          const particle = state.particles[i];
          particle.update();
          particle.draw(ctx);
          if (particle.isDead(state.width, state.height)) {
            state.particles.splice(i, 1);
          }
        }

        state.rafId = requestAnimationFrame(animate);
      }

      function startLoop() {
        if (state.rafId) return;
        state.rafId = requestAnimationFrame(animate);
      }

      function stopLoop() {
        if (!state.rafId) return;
        cancelAnimationFrame(state.rafId);
        state.rafId = 0;
      }

      function triggerFlash() {
        elements.flash.classList.remove('active');
        void elements.flash.offsetWidth;
        elements.flash.classList.add('active');
      }

      function fadeOutGiftView() {
        elements.giftView.style.opacity = '0';
        elements.giftView.style.transform = 'translateY(18px) scale(0.96)';
        elements.giftView.style.pointerEvents = 'none';
      }

      function showCardView() {
        elements.cardView.hidden = false;
        elements.cardView.style.opacity = '1';
        elements.cardView.style.transform = 'translateY(0)';
        elements.card.classList.remove('is-visible');
        void elements.card.offsetWidth;
        elements.card.classList.add('is-visible');
      }

      function openGift() {
        if (state.opened) return;
        state.opened = true;

        const rect = elements.giftButton.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        elements.giftButton.classList.add('shake');
        elements.giftButton.classList.add('opened');
        elements.giftButton.setAttribute('aria-expanded', 'true');

        if (!state.reducedMotion) {
          burstAt(centerX, centerY, 86);
        } else {
          burstAt(centerX, centerY, 24);
        }

        triggerFlash();

        window.setTimeout(() => {
          fadeOutGiftView();
        }, state.reducedMotion ? 40 : 260);

        window.setTimeout(() => {
          elements.giftView.hidden = true;
          showCardView();
          burstAroundCard();
        }, state.reducedMotion ? 100 : 620);
      }

      function resetGift() {
        state.opened = false;
        state.particles.length = 0;

        elements.card.classList.remove('is-visible');
        elements.cardView.hidden = true;
        elements.giftView.hidden = false;
        elements.giftView.style.opacity = '1';
        elements.giftView.style.transform = 'translateY(0) scale(1)';
        elements.giftView.style.pointerEvents = 'auto';
        elements.giftButton.classList.remove('shake', 'opened');
        elements.giftButton.setAttribute('aria-expanded', 'false');
      }

      function sprinkleExtra() {
        if (!state.opened) return;
        const rect = elements.card.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;
        burstAt(x, y, state.reducedMotion ? 20 : 56);
        triggerFlash();
      }

      function onGiftPress(event) {
        if (event) event.preventDefault();
        openGift();
      }

      function onKeyOpen(event) {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          openGift();
        }
      }

      function handleVisibility() {
        if (document.hidden) {
          state.visibilityPaused = true;
          stopLoop();
        } else if (state.visibilityPaused) {
          state.visibilityPaused = false;
          startLoop();
        }
      }

      function preloadImage() {
        const src = elements.momPhoto.getAttribute('src');
        if (!src) return;
        const image = new Image();
        image.decoding = 'async';
        image.src = src;
      }

      function bindEvents() {
        elements.giftButton.addEventListener('pointerup', onGiftPress, { passive: false });
        elements.giftButton.addEventListener('keydown', onKeyOpen);
        elements.replayButton.addEventListener('click', resetGift);
        elements.burstButton.addEventListener('click', sprinkleExtra);

        window.addEventListener('resize', requestResize, { passive: true });
        window.addEventListener('orientationchange', () => {
          window.setTimeout(requestResize, 120);
          window.setTimeout(requestResize, 320);
        }, { passive: true });

        document.addEventListener('visibilitychange', handleVisibility);

        const motionMedia = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (typeof motionMedia.addEventListener === 'function') {
          motionMedia.addEventListener('change', (event) => {
            state.reducedMotion = event.matches;
          });
        } else if (typeof motionMedia.addListener === 'function') {
          motionMedia.addListener((event) => {
            state.reducedMotion = event.matches;
          });
        }

        const hoverMedia = window.matchMedia('(hover: hover) and (pointer: fine)');
        if (typeof hoverMedia.addEventListener === 'function') {
          hoverMedia.addEventListener('change', setInteractiveClass);
        } else if (typeof hoverMedia.addListener === 'function') {
          hoverMedia.addListener(setInteractiveClass);
        }
      }

      function init() {
        preloadImage();
        setInteractiveClass();
        resizeCanvas();
        bindEvents();
        startLoop();
      }

      init();
    })();
  </script>
</body>
</html>
